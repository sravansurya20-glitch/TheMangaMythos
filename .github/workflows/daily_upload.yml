name: Daily YouTube Auto-Upload

on:
  schedule:
    - cron: '0 22 * * *'   # runs every day at 6:00 PM Indianapolis time (22:00 UTC)
    - cron: '0 23 * * *'   # runs every day at 7:00 PM Indianapolis time (23:00 UTC)
  workflow_dispatch:        # lets you trigger it manually from GitHub UI

jobs:
  upload-video:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4


      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full pipeline
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/pipeline.py
